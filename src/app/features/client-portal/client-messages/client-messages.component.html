<div class="p-6" dir="rtl">
  <div class="mb-8">
    <h1 class="text-3xl font-bold text-gray-900">الرسائل والدعم</h1>
    <p class="text-gray-600 mt-2">التواصل مع فريق الدعم للمشروعات</p>
  </div>

  @if (loading()) {
    <div class="flex justify-center items-center py-20">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
    </div>
  }

  @if (!loading() && projects().length > 0) {
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      @for (project of projects(); track project.id) {
        <div (click)="openChat(project)" class="bg-white rounded-xl shadow-md p-6 hover:shadow-lg transition-all cursor-pointer">
          <h3 class="font-bold text-lg mb-2">{{ project.name }}</h3>
          <p class="text-sm text-gray-600 mb-4">اضغط لفتح المحادثة</p>
          <button class="w-full px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-colors">
            فتح المحادثة
          </button>
        </div>
      }
    </div>
  }

  @if (!loading() && projects().length === 0) {
    <div class="text-center py-20 bg-white rounded-xl shadow-md">
      <p class="text-gray-500">لا توجد مشاريع للتواصل بشأنها</p>
    </div>
  }
</div>
